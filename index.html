<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezervace motorek</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #eef3f8, #dfe9f3);
            margin: 0;
            padding: 16px;
            color: #1f2937;
        }

        .container {
            width: 95%;
            max-width: 1200px;
            margin: 0 auto;
            background: #ffffff;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.10);
        }

        h1 {
            text-align: center;
            font-size: 32px;
            margin-top: 0;
            margin-bottom: 22px;
            color: #0f172a;
        }

        .layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 22px;
            align-items: start;
        }

        .card {
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 18px;
        }

        h2 {
            margin-top: 0;
            font-size: 22px;
            margin-bottom: 16px;
            color: #111827;
        }

        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 10px 12px;
            margin-top: 6px;
            font-size: 14px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background: #fff;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        button {
            margin-top: 18px;
            padding: 12px 14px;
            width: 100%;
            font-size: 15px;
            font-weight: bold;
            background: #2563eb;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 10px;
            transition: 0.2s ease;
        }

        button:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }

        .message {
            margin-top: 14px;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
        }

        .success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .toolbar input,
        .toolbar select {
            width: auto;
            min-width: 180px;
            flex: 1;
            margin-top: 0;
        }

        .table-wrap {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            background: white;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            font-size: 14px;
            min-width: 680px;
        }

        th, td {
            padding: 11px 12px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }

        th {
            background: #eff6ff;
            color: #1e3a8a;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        tr:hover td {
            background: #f8fafc;
        }

        .badge {
            display: inline-block;
            padding: 5px 9px;
            border-radius: 999px;
            background: #dbeafe;
            color: #1d4ed8;
            font-size: 12px;
            font-weight: bold;
        }

        .empty {
            padding: 20px;
            text-align: center;
            color: #6b7280;
            font-size: 15px;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 1000px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 700px) {
            body {
                padding: 10px;
            }

            .container {
                width: 100%;
                padding: 16px;
                border-radius: 12px;
            }

            h1 {
                font-size: 26px;
            }

            h2 {
                font-size: 20px;
            }

            .toolbar {
                flex-direction: column;
            }

            .toolbar input,
            .toolbar select {
                min-width: 100%;
            }

            table {
                min-width: 600px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Rezervace motorek</h1>

    <div class="layout">
        <div class="card">
            <h2>Nová rezervace</h2>

            <form id="reservationForm">
                <label for="teacherSelect">Lektor</label>
                <select id="teacherSelect" required>
                    <option value="">-- Vyber lektora --</option>
                    <option value="Aleš Pinkas">Aleš Pinkas</option>
                    <option value="Radek Skořepa">Radek Skořepa</option>
                    <option value="Zdeněk Wagner">Zdeněk Wagner</option>
                    <option value="Miroslav Kotek">Miroslav Kotek</option>
                    <option value="Petr Vurm">Petr Vurm</option>
                    <option value="Vlastimil Macháček">Vlastimil Macháček</option>
                    <option value="Jan Vurm">Jan Vurm</option>
                    <option value="Josef Rosůlek">Josef Rosůlek</option>
                    <option value="Petr Kos">Kos</option>
                    <option value="Šárka Paulosová">Šárka Paulosová</option>
                    <option value="__other__">Dopsat další jméno</option>
                </select>

                <div id="otherTeacherWrap" class="hidden">
                    <label for="teacherCustom">Jiný lektor</label>
                    <input type="text" id="teacherCustom" placeholder="Napiš jméno lektora">
                </div>

                <label for="bike">Motorka</label>
                <select id="bike">
                    <option>A1 Yamaha IBR</option>
                    <option>A1 Honda</option>
                    <option>A1 Benelli</option>
                    <option>A2</option>
                    <option>A</option>
                </select>

                <label for="date">Datum</label>
                <input type="date" id="date" required>

                <label for="from">Čas od</label>
                <input type="time" id="from" required>

                <label for="to">Čas do</label>
                <input type="time" id="to" required>

                <button type="submit">Rezervovat</button>
            </form>

            <div id="msg"></div>
        </div>

        <div class="card">
            <h2>Přehled rezervací</h2>

            <div class="toolbar">
                <input type="text" id="searchInput" placeholder="Hledat podle lektora nebo motorky...">
                <input type="date" id="filterDate">
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Motorka</th>
                            <th>Lektor</th>
                            <th>Datum</th>
                            <th>Čas</th>
                            <th>Stav</th>
                        </tr>
                    </thead>
                    <tbody id="calendar"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
const msg = document.getElementById("msg");
const calendarBody = document.getElementById("calendar");
const searchInput = document.getElementById("searchInput");
const filterDate = document.getElementById("filterDate");
const teacherSelect = document.getElementById("teacherSelect");
const teacherCustom = document.getElementById("teacherCustom");
const otherTeacherWrap = document.getElementById("otherTeacherWrap");

let allReservations = [];

teacherSelect.addEventListener("change", () => {
    if (teacherSelect.value === "__other__") {
        otherTeacherWrap.classList.remove("hidden");
        teacherCustom.required = true;
    } else {
        otherTeacherWrap.classList.add("hidden");
        teacherCustom.required = false;
        teacherCustom.value = "";
    }
});

function showMessage(text, type) {
    msg.innerHTML = `<div class="message ${type}">${text}</div>`;
}

function clearMessage() {
    msg.innerHTML = "";
}

function sortReservations(data) {
    return [...data].sort((a, b) => {
        const aKey = `${a.date} ${a.from}`;
        const bKey = `${b.date} ${b.from}`;
        return aKey.localeCompare(bKey);
    });
}

function renderReservations(data) {
    calendarBody.innerHTML = "";

    if (data.length === 0) {
        calendarBody.innerHTML = `
            <tr>
                <td colspan="5" class="empty">Zatím nejsou žádné rezervace.</td>
            </tr>
        `;
        return;
    }

    const now = new Date();

    data.forEach(r => {
        const endDateTime = new Date(`${r.date}T${r.to}:00`);
        const status = endDateTime < now ? "Proběhlo" : "Aktivní";

        calendarBody.insertAdjacentHTML("beforeend", `
            <tr>
                <td>${r.bike}</td>
                <td>${r.teacher}</td>
                <td>${r.date}</td>
                <td>${r.from} – ${r.to}</td>
                <td><span class="badge">${status}</span></td>
            </tr>
        `);
    });
}

function applyFilters() {
    const search = searchInput.value.toLowerCase().trim();
    const selectedDate = filterDate.value;

    const filtered = sortReservations(allReservations).filter(r => {
        const matchesSearch =
            r.teacher.toLowerCase().includes(search) ||
            r.bike.toLowerCase().includes(search);

        const matchesDate = !selectedDate || r.date === selectedDate;

        return matchesSearch && matchesDate;
    });

    renderReservations(filtered);
}

async function loadReservations() {
    try {
        const res = await fetch("/reservations");
        const data = await res.json();
        allReservations = data;
        applyFilters();
    } catch (error) {
        showMessage("Nepodařilo se načíst rezervace.", "error");
        console.error(error);
    }
}

document.getElementById("reservationForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    clearMessage();

    let teacher = teacherSelect.value;

    if (teacher === "__other__") {
        teacher = teacherCustom.value.trim();
    }

    const reservation = {
        teacher: teacher,
        bike: document.getElementById("bike").value.trim(),
        date: document.getElementById("date").value,
        from: document.getElementById("from").value,
        to: document.getElementById("to").value
    };

    if (!reservation.teacher || !reservation.bike || !reservation.date || !reservation.from || !reservation.to) {
        showMessage("Vyplň všechna pole.", "error");
        return;
    }

    if (reservation.from >= reservation.to) {
        showMessage("Čas od musí být menší než čas do.", "error");
        return;
    }

    try {
        const res = await fetch("/reserve", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(reservation)
        });

        const data = await res.json();

        if (!res.ok) {
            showMessage(data.error || "Rezervaci se nepodařilo uložit.", "error");
            return;
        }

        showMessage(data.message || "Rezervace byla úspěšně uložena.", "success");
        document.getElementById("reservationForm").reset();
        otherTeacherWrap.classList.add("hidden");
        teacherCustom.required = false;
        teacherCustom.value = "";
        await loadReservations();
    } catch (error) {
        showMessage("Chyba spojení se serverem.", "error");
        console.error(error);
    }
});

searchInput.addEventListener("input", applyFilters);
filterDate.addEventListener("change", applyFilters);

loadReservations();
</script>

</body>
</html>
